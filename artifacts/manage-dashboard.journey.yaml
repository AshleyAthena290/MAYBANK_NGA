source: P&T_Local_Transfer_DDD_Screen_to_API_v1.xlsx
feature: Local Transfer (All Journeys)
category: Transfer / Dashboard / Settings
journey:
  title: Journey 1 – Transfer Dashboard
  code: Manage_Dashboard
  description: The dashboard landing screen where user opens the transfer feature.
summary:
  totalTestCases: 11
  apiLinkedCases: 11
  uiOnlyCases: 0
keyApis:
  - name: GetJourneyContent
    method: GET
    endpoint: cms/journeys/payment_transfer_local_flow?locale=en_MY&channel=MOBILE
  - name: getCustomGroups
    method: GET
    endpoint: /v1/external/transfer/groups/custom?scope=LOCAL
  - name: getTransferBeneficiaries
    method: GET
    endpoint: /v1/external/transfer?scope=LOCAL&groupType={type}&page=0&limit=10
  - name: getDashboard
    method: GET
    endpoint: /v1/external/accounts?accountGroup=CASA
  - name: getTransferBeneficiariesSearch
    method: GET
    endpoint: /v1/external/transfer/search?scope=LOCAL&groupType=ALL&keyword={kw}&page=0&limit=10
  - name: getBeneficiaryInquiry
    method: GET
    endpoint: /v1/internal/inquiry?accountId={id}&bicCode=MBBEMYKL&currency={cur}
testCases:
  - id: TC_DASH_001
    title: Transfer Dashboard loads CMS content successfully
    feature: Transfer Dashboard
    type: Positive
    priority: High
    api: GetJourneyContent
    businessFlow:
      preconditions:
        - User is authenticated and taps the Transfer module.
      steps:
        - Launch the app and log in.
        - Navigate to the Transfer module.
        - Observe the Transfer Dashboard screen.
      expectedResults:
        - >-
          CMS content (navigation, tabs, banners) is loaded from
          cms/journeys/payment_transfer_local_flow?locale=en_MY&channel=MOBILE.
        - Screen title, tab labels (Local, Overseas), and other CMS-driven UI elements are displayed correctly.
    apiJourney:
      automationType: api-business-flow
      requiresApiValidation: true
      references:
        - name: GetJourneyContent
          method: GET
          endpoint: cms/journeys/payment_transfer_local_flow?locale=en_MY&channel=MOBILE
  - id: TC_DASH_002
    title: Custom group tabs are loaded from API
    feature: Transfer Dashboard
    type: Positive
    priority: High
    api: getCustomGroups
    businessFlow:
      preconditions:
        - User has existing custom groups configured.
        - User is on Transfer Dashboard.
      steps:
        - Navigate to Transfer Dashboard.
        - Observe the group tabs at the top of the recipient list.
      expectedResults:
        - Custom group tabs are fetched via GET /v1/external/transfer/groups/custom?scope=LOCAL.
        - User-created custom group names appear as selectable tabs.
    apiJourney:
      automationType: api-business-flow
      requiresApiValidation: true
      references:
        - name: getCustomGroups
          method: GET
          endpoint: /v1/external/transfer/groups/custom?scope=LOCAL
  - id: TC_DASH_003
    title: Frequent tab displays beneficiary list
    feature: Transfer Dashboard
    type: Positive
    priority: High
    api: getTransferBeneficiaries
    businessFlow:
      preconditions:
        - User has frequent transfer recipients.
        - User is on Transfer Dashboard.
      steps:
        - Navigate to Transfer Dashboard.
        - Tap the "Frequent" tab.
        - Observe the displayed list.
      expectedResults:
        - API GET /v1/external/transfer?scope=LOCAL&groupType=FREQUENT&page=0&limit=10 is called.
        - Frequent beneficiaries are listed correctly with name, account number, and bank.
    apiJourney:
      automationType: api-business-flow
      requiresApiValidation: true
      references:
        - name: getTransferBeneficiaries
          method: GET
          endpoint: /v1/external/transfer?scope=LOCAL&groupType={type}&page=0&limit=10
