  - id: TC_DASH_005
    title: Custom tab displays filtered beneficiary list
    feature: Transfer Dashboard
    type: Positive
    priority: Medium
    api: getTransferBeneficiaries
    businessFlow:
      preconditions:
        - User has a custom group (e.g., groupId=G002) with recipients.
      steps:
        - Navigate to Transfer Dashboard.
        - Tap a Custom group tab (e.g., "Work").
        - Observe the displayed list.
      expectedResults:
        - API GET /v1/external/transfer?scope=LOCAL&groupType=CUSTOM&groupId=G002&page=0&limit=10 is called.
