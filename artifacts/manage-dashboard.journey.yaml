  - id: TC_DASH_008
    title: Search returns matching beneficiaries
    feature: Transfer Dashboard
    type: Positive
    priority: High
    api: getTransferBeneficiariesSearch
    businessFlow:
      preconditions:
        - User is on Transfer Dashboard with at least one beneficiary named containing "ABC".
      steps:
        - Navigate to Transfer Dashboard.
        - Tap the Search input field.
        - Type the keyword "ABC".
        - Observe the search results.
      expectedResults:
        - API GET /v1/external/transfer/search?scope=LOCAL&groupType=ALL&keyword=ABC&page=0&limit=10 is called.
        - Matching beneficiaries are returned and displayed in the results list.
    apiJourney:
      automationType: api-business-flow
      requiresApiValidation: true
      references:
        - name: getTransferBeneficiariesSearch
          method: GET
          endpoint: /v1/external/transfer/search?scope=LOCAL&groupType=ALL&keyword={kw}&page=0&limit=10
