id: GetPreLoginLimit-001-positive
title: GET /limit - Happy Path
feature: ptscanandpaydddapispecv2working
description: |-
  Retrieves the configured pre-login transaction limit for QR Pay transactions. The pre-login limit is used by NGA App during the Confirmation step of the QR Pre-Login (L1) journey to determine whether step-up authentication is required before Secure2U (S2U) authorization.

  If:

  transactionAmount > preLoginLimit → user must perform step-up authentication (L1 → L3)
  transactionAmount <= preLoginLimit → user may proceed directly to S2U authorization

  This API supports QR Pay Domestic and QR Pay Overseas only. Cardless Withdrawal (ATM Cash Out) is excluded from pre-login flow eligibility.
